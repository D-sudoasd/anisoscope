<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">AnisoScope</title>
  <desc id="desc">Inspect crystal elastic anisotropy from a 6x6 stiffness matrix Cij with scalar, directional, and 3D surface outputs plus export manifests.</desc>
  <rect width="1200" height="340" rx="28" fill="#0d1117"/>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="56" y="72" fill="#c4b5fd" font-size="18" font-weight="700" letter-spacing="2">CRYSTAL ELASTICITY · Cij</text>
    <text x="56" y="130" fill="#f8fafc" font-size="48" font-weight="800">AnisoScope</text>
    <text x="56" y="176" fill="#94a3b8" font-size="22">Directional elastic properties from a 6×6 stiffness matrix.</text>
    <text x="56" y="218" fill="#64748b" font-size="18">E(n) · β(n) · G · ν · Voigt/Reuss/Hill · export manifests</text>
    <text x="56" y="270" fill="#a78bfa" font-size="16">Correctness & provenance first · then publication figures</text>
  </g>
  <!-- anisotropy surface motif -->
  <g transform="translate(720 40)">
    <rect width="420" height="260" rx="16" fill="#111827" stroke="#4c1d95" stroke-width="2"/>
    <ellipse cx="210" cy="130" rx="130" ry="90" fill="none" stroke="#7c3aed" stroke-width="2.5"/>
    <ellipse cx="210" cy="130" rx="95" ry="55" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <ellipse cx="210" cy="130" rx="55" ry="28" fill="none" stroke="#c4b5fd" stroke-width="1.5"/>
    <line x1="80" y1="130" x2="340" y2="130" stroke="#334155" stroke-width="1"/>
    <line x1="210" y1="40" x2="210" y2="220" stroke="#334155" stroke-width="1"/>
    <text x="24" y="250" fill="#64748b" font-family="ui-monospace, monospace" font-size="13">1D · 2D polar · 3D surface · GIF/MP4</text>
  </g>
</svg>
